name: Monitor Vinile

# Quando eseguire il workflow
on:
  schedule:
    - cron: '0 9 * * *'   # Ogni giorno alle 9:00 UTC
  workflow_dispatch:       # Permette di eseguire manualmente da GitHub

jobs:
  run-script:
    runs-on: ubuntu-latest   # Computer virtuale Linux

    steps:
      # 1️⃣ Clona il repository (scarica lo script)
      - name: Clona repository
        uses: actions/checkout@v3

      # 2️⃣ Installa Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3️⃣ Installa le librerie necessarie
      - name: Install dependencies
        run: pip install requests

      # 4️⃣ Esegui lo script
      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python monitor_vinile.py
